databases:
  - name: alcom-db
    plan: free
    region: oregon 

services:
  - type: web
    name: alcom-api
    runtime: python
    region: oregon
    plan: free

    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput

    startCommand: "python manage.py migrate && gunicorn alcom_project.wsgi:application"

    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "alcom-api.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: alcom-db
          property: connectionString
