databases:
  - name: alcom-db
    databaseName: alcom_db
    user: postgres
    region: singapore
    plan: free

services:
  - type: web
    name: alcom-api
    runtime: python  # Fixed from 'env'
    region: oregon   # Recommended for better free tier stability
    plan: free

    buildCommand: >
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate

    startCommand: gunicorn alcom_project.wsgi:application

    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*"
