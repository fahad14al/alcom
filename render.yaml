databases:
  - name: alcom-db
    databaseName: alcom_db
    user: postgres
    region: singapore
    plan: free

services:
  - type: web
    name: alcom-api
    env: python
    region: singapore
    plan: free

    buildCommand: >
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput

    startCommand: python manage.py migrate && gunicorn alcom_project.wsgi:application

    envVars:
      - key: DEBUG
        value: False

      - key: SECRET_KEY
        generateValue: true

      - key: ALLOWED_HOSTS
        value: "*"

      - key: DATABASE_URL
        fromDatabase:
          name: alcom-db
          property: connectionString
