services:
  - type: web
    name: alcom-api
    env: python
    region: singapore
    plan: free

    buildCommand: >
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate

    startCommand: gunicorn alcom_project.wsgi:application

    envVars:
      - key: DEBUG
        value: False

      - key: SECRET_KEY
        generateValue: true

      - key: ALLOWED_HOSTS
        value: "*"
