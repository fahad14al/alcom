services:
  - type: web
    name: alcom-api
    runtime: python  # Fixed from 'env'
    region: oregon   # Recommended for better free tier stability
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: "gunicorn alcom.wsgi:application"
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "alcom-api.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: alcom-db
          property: connectionString

databases:
  - name: alcom-db
    plan: free
    region: oregon # Must match the service region
